<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Precificaz" />
  <meta name="theme-color" content="#5D7052" />
  <meta name="description" content="Precificação de artigos artesanais com controle de materiais e estoque" />

  <title>Precificaz</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Apple Touch Icons (serão gerados na etapa de design) -->
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- App Shell -->
  <div id="app">
    <!-- Conteúdo das páginas é injetado aqui pelo router -->
    <div id="page-container" style="flex:1;display:flex;flex-direction:column;"></div>

    <!-- Tab Bar (só aparece quando autenticado) -->
    <nav class="tab-bar" id="tab-bar" style="display:none;">
      <button class="tab-item" data-page="dashboard" onclick="Router.go('dashboard')">
        <span class="tab-item__icon">
          <i data-lucide="layout-dashboard" width="22" height="22"></i>
        </span>
        <span class="tab-item__label">Início</span>
      </button>
      <button class="tab-item" data-page="materiais" onclick="Router.go('materiais')">
        <span class="tab-item__icon">
          <i data-lucide="scissors" width="22" height="22"></i>
        </span>
        <span class="tab-item__label">Materiais</span>
      </button>
      <button class="tab-item" data-page="pecas" onclick="Router.go('pecas')">
        <span class="tab-item__icon">
          <i data-lucide="package" width="22" height="22"></i>
        </span>
        <span class="tab-item__label">Peças</span>
      </button>
      <button class="tab-item" data-page="estoque" onclick="Router.go('estoque')">
        <span class="tab-item__icon">
          <i data-lucide="archive" width="22" height="22"></i>
        </span>
        <span class="tab-item__label">Estoque</span>
      </button>
      <button class="tab-item" data-page="precificacao" onclick="Router.go('precificacao')">
        <span class="tab-item__icon">
          <i data-lucide="tag" width="22" height="22"></i>
        </span>
        <span class="tab-item__label">Preço</span>
      </button>
    </nav>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Modal container -->
  <div id="modal-container"></div>

  <!-- Scripts (ordem importa) -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
