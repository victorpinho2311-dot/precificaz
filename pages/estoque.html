<!-- ============================================================
     PRECIFICAZ — Estoque
     Controle de entradas e saídas de materiais
     ============================================================ -->
<div class="page-header">
  <h1 class="page-header__title">Estoque</h1>
</div>

<div class="page-content">
  <!-- Filtro de tipo -->
  <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-4);overflow-x:auto;padding-bottom:4px;">
    <button class="chip active" id="chip-todos"    onclick="EstoquePage.filtrarTipo('todos')">Todos</button>
    <button class="chip"        id="chip-entrada"  onclick="EstoquePage.filtrarTipo('entrada')">Entradas</button>
    <button class="chip"        id="chip-saida"    onclick="EstoquePage.filtrarTipo('saida')">Saídas</button>
  </div>

  <div id="estoque-lista">
    <div class="empty-state"><div class="loading-spinner"></div></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="EstoquePage.abrirModal()">
  <i data-lucide="plus" width="24" height="24"></i>
</button>

<!-- Modal de movimentação -->
<div class="modal-backdrop" id="est-modal">
  <div class="modal">
    <div class="modal__handle"></div>
    <div class="modal__header">
      <h2 class="modal__title">Movimentação de Estoque</h2>
      <button class="btn btn--ghost btn--sm" onclick="EstoquePage.fecharModal()">
        <i data-lucide="x" width="20" height="20"></i>
      </button>
    </div>

    <form id="est-form" onsubmit="EstoquePage.salvar(event)">
      <div style="display:flex;flex-direction:column;gap:var(--space-4);">
        <!-- Tipo -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);">
          <button type="button" id="btn-tipo-entrada" class="btn btn--primary"
            onclick="EstoquePage.setTipo('entrada')">
            <i data-lucide="arrow-down-circle" width="18" height="18"></i>
            Entrada
          </button>
          <button type="button" id="btn-tipo-saida" class="btn btn--outline"
            onclick="EstoquePage.setTipo('saida')">
            <i data-lucide="arrow-up-circle" width="18" height="18"></i>
            Saída
          </button>
        </div>
        <input type="hidden" id="est-tipo" value="entrada" />

        <div class="form-group">
          <label class="form-label">Material <span class="required">*</span></label>
          <select class="form-select" id="est-material" required>
            <option value="">Selecionar material...</option>
          </select>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);">
          <div class="form-group">
            <label class="form-label">Quantidade <span class="required">*</span></label>
            <input class="form-input" type="number" id="est-qtd" placeholder="0" min="0.01" step="0.01" required />
          </div>
          <div class="form-group">
            <label class="form-label">Data</label>
            <input class="form-input" type="date" id="est-data" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Observação</label>
          <input class="form-input" type="text" id="est-obs" placeholder="Motivo, referência..." />
        </div>

        <button type="submit" class="btn btn--primary btn--full" id="est-save-btn">
          <i data-lucide="check" width="18" height="18"></i>
          Registrar movimentação
        </button>
      </div>
    </form>
  </div>
</div>

<script>
window.EstoquePage = (() => {
  let movimentos = [];
  let materiais  = [];
  let tipoFiltro = 'todos';

  document.addEventListener('pageLoaded', async (e) => {
    if (e.detail.page !== 'estoque') return;
    await carregar();
  }, { once: true });

  async function carregar() {
    try {
      const [resEst, resMats] = await Promise.all([
        API.getEstoque(() => carregar()),
        API.getMateriais(),
      ]);
      movimentos = resEst.data  || [];
      materiais  = resMats.data || [];
      renderizar();
    } catch {
      Utils.toast('Erro ao carregar estoque.', 'error');
    }
  }

  function renderizar() {
    const lista = document.getElementById('estoque-lista');
    const filtrado = tipoFiltro === 'todos'
      ? movimentos
      : movimentos.filter(m => m.tipo === tipoFiltro);

    if (!filtrado.length) {
      lista.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">📦</div>
          <div class="empty-state__title">Sem movimentações</div>
          <div class="empty-state__desc">Registre a entrada ou saída de materiais</div>
        </div>`;
      return;
    }

    lista.innerHTML = filtrado.map(m => {
      const mat = materiais.find(x => x.id === m.materialId);
      const isEntrada = m.tipo === 'entrada';
      return `
        <div class="list-item" style="cursor:default;">
          <div style="width:40px;height:40px;border-radius:var(--radius-md);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${isEntrada ? 'rgba(93,112,82,0.12)' : 'rgba(168,84,72,0.12)'};color:${isEntrada ? 'var(--color-primary)' : 'var(--color-destructive)'};">
            <i data-lucide="${isEntrada ? 'arrow-down-circle' : 'arrow-up-circle'}" width="20" height="20"></i>
          </div>
          <div class="list-item__info">
            <div class="list-item__name">${Utils.escapeHtml(mat?.nome || 'Material removido')}</div>
            <div class="list-item__meta">${Utils.formatDate(m.data)} ${m.obs ? '· ' + Utils.escapeHtml(m.obs) : ''}</div>
          </div>
          <div style="font-weight:700;font-size:var(--text-sm);color:${isEntrada ? 'var(--color-primary)' : 'var(--color-destructive)'};">
            ${isEntrada ? '+' : '-'}${m.quantidade} ${Utils.escapeHtml(mat?.unidade || '')}
          </div>
        </div>
      `;
    }).join('');

    Utils.refreshIcons();
  }

  function filtrarTipo(tipo) {
    tipoFiltro = tipo;
    ['todos', 'entrada', 'saida'].forEach(t => {
      document.getElementById(`chip-${t}`)?.classList.toggle('active', t === tipo);
    });
    renderizar();
  }

  function abrirModal() {
    document.getElementById('est-form').reset();
    setTipo('entrada');

    // Popular select de materiais (ordem alfabética)
    const sel    = document.getElementById('est-material');
    const sorted = [...materiais].sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
    sel.innerHTML = '<option value="">Selecionar material...</option>' +
      sorted.map(m => `<option value="${m.id}">${Utils.escapeHtml(m.nome)} (${Utils.escapeHtml(m.unidade)})</option>`).join('');

    // Data padrão: hoje
    document.getElementById('est-data').value = new Date().toISOString().split('T')[0];

    document.getElementById('est-modal').classList.add('open');
    Utils.refreshIcons();
  }

  function fecharModal() {
    document.getElementById('est-modal').classList.remove('open');
  }

  function setTipo(tipo) {
    document.getElementById('est-tipo').value = tipo;
    const btnE = document.getElementById('btn-tipo-entrada');
    const btnS = document.getElementById('btn-tipo-saida');
    if (tipo === 'entrada') {
      btnE.className = 'btn btn--primary';
      btnS.className = 'btn btn--outline';
    } else {
      btnE.className = 'btn btn--outline';
      btnS.className = 'btn btn--primary';
    }
    Utils.refreshIcons();
  }

  async function salvar(e) {
    e.preventDefault();
    const btn = document.getElementById('est-save-btn');
    btn.disabled = true;

    const mov = {
      id:          Utils.uid(),
      tipo:        document.getElementById('est-tipo').value,
      materialId:  document.getElementById('est-material').value,
      quantidade:  parseFloat(document.getElementById('est-qtd').value),
      data:        document.getElementById('est-data').value,
      obs:         document.getElementById('est-obs').value,
    };

    try {
      await API.movimentarEstoque(mov);
      Utils.toast('Movimentação registrada!', 'success');
      fecharModal();
      await carregar();
    } catch (err) {
      console.error('[EstoquePage] Erro ao salvar:', err);
      Utils.toast('Erro ao registrar: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  return { abrirModal, fecharModal, salvar, filtrarTipo, setTipo };
})();
</script>
