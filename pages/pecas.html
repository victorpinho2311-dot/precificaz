<!-- ============================================================
     PRECIFICAZ — Peças
     Cadastro de produtos com seus materiais e medidas
     ============================================================ -->
<div class="page-header">
  <h1 class="page-header__title">Peças</h1>
</div>

<div class="page-content">
  <div class="search-bar">
    <span class="search-bar__icon">
      <i data-lucide="search" width="16" height="16"></i>
    </span>
    <input
      class="form-input"
      type="search"
      placeholder="Buscar peça..."
      id="peca-search"
      oninput="PecasPage.filtrar(this.value)"
    />
  </div>

  <div id="peca-lista">
    <div class="empty-state">
      <div class="loading-spinner"></div>
    </div>
  </div>
</div>

<button class="fab" onclick="PecasPage.abrirModal()">
  <i data-lucide="plus" width="24" height="24"></i>
</button>

<!-- Modal de cadastro/edição de peça -->
<div class="modal-backdrop" id="peca-modal">
  <div class="modal">
    <div class="modal__handle"></div>
    <div class="modal__header">
      <h2 class="modal__title" id="peca-modal-title">Nova Peça</h2>
      <button class="btn btn--ghost btn--sm" onclick="PecasPage.fecharModal()">
        <i data-lucide="x" width="20" height="20"></i>
      </button>
    </div>

    <form id="peca-form" onsubmit="PecasPage.salvar(event)">
      <!-- Foto -->
      <div style="display:flex;justify-content:center;margin-bottom:var(--space-5);">
        <div class="photo-upload-container" style="position:relative;width:100%;max-width:160px;">
          <label class="photo-upload" id="peca-photo-label" style="margin:0;">
            <input type="file" accept="image/*" id="peca-photo-input" onchange="PecasPage.previewFoto(this)" />
            <i data-lucide="camera" width="24" height="24" style="color:var(--color-muted-fg);" id="peca-camera-icon"></i>
            <span class="photo-upload__label">Foto da peça</span>
          </label>
          <button type="button" class="photo-upload__remove" id="peca-photo-remove" style="display:none;" onclick="PecasPage.removerFoto(event)">
            <i data-lucide="trash-2" width="16" height="16"></i>
          </button>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:var(--space-4);">
        <div class="form-group">
          <label class="form-label">Nome da peça <span class="required">*</span></label>
          <input class="form-input" type="text" id="peca-nome" placeholder="Ex: Bolsa de tecido" required />
        </div>

        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select class="form-select" id="peca-categoria">
            <option value="">Selecionar...</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Descrição</label>
          <textarea class="form-textarea" id="peca-desc" placeholder="Detalhes, tamanho, cores..."></textarea>
        </div>

        <!-- Tempo de confecção -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);">
          <div class="form-group">
            <label class="form-label">Tempo (horas)</label>
            <input class="form-input" type="number" id="peca-horas" placeholder="0" min="0" step="0.5" />
          </div>
          <div class="form-group">
            <label class="form-label">Valor/hora (R$)</label>
            <input class="form-input" type="number" id="peca-valor-hora" placeholder="0,00" min="0" step="0.01" />
          </div>
        </div>

        <!-- Materiais utilizados -->
        <div>
          <label class="form-label" style="display:block;margin-bottom:var(--space-2);">
            Materiais utilizados
          </label>
          <div id="peca-mat-lista" style="display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-3);"></div>
          <button type="button" class="btn btn--outline btn--sm btn--full" onclick="PecasPage.adicionarMaterial()">
            <i data-lucide="plus" width="16" height="16"></i>
            Adicionar material
          </button>
        </div>

        <!-- Custo calculado (readonly) -->
        <div class="card card--flat" style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-3) var(--space-4);">
          <span style="font-size:var(--text-sm);color:var(--color-muted-fg);">Custo estimado de materiais</span>
          <span style="font-weight:700;color:var(--color-primary);" id="peca-custo-calc">R$ 0,00</span>
        </div>

        <input type="hidden" id="peca-id" />
        <input type="hidden" id="peca-foto-base64" />
        <input type="hidden" id="peca-materiais-json" value="[]" />

        <button type="submit" class="btn btn--primary btn--full" id="peca-save-btn">
          <i data-lucide="save" width="18" height="18"></i>
          Salvar Peça
        </button>
      </div>
    </form>
  </div>
</div>

<script>
window.PecasPage = (() => {
  let pecas      = [];
  let materiais  = [];
  let filtrado   = [];
  let matsPeca   = [];
  let listenersOk = false;
  let blockClick  = false;
  let pressTimer  = null;

  document.addEventListener('pageLoaded', async (e) => {
    if (e.detail.page !== 'pecas') return;
    await carregar();
  }, { once: true });

  async function carregar() {
    try {
      const [resPecas, resMats] = await Promise.all([API.getPecas(), API.getMateriais()]);
      pecas     = (resPecas.data || []).sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
      materiais = (resMats.data  || []).sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
      filtrado  = [...pecas];
      renderizar();
    } catch {
      Utils.toast('Erro ao carregar peças.', 'error');
    }
  }

  function renderizar() {
    const lista = document.getElementById('peca-lista');
    if (!filtrado.length) {
      lista.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🧶</div>
          <div class="empty-state__title">Nenhuma peça</div>
          <div class="empty-state__desc">Toque em + para cadastrar sua primeira peça</div>
        </div>`;
      Utils.refreshIcons();
      return;
    }

    lista.innerHTML = filtrado.map(p => `
      <div class="list-item" data-id="${p.id}">
        ${p.foto
          ? `<img class="list-item__photo" src="${p.foto}" alt="${Utils.escapeHtml(p.nome)}" />`
          : `<div class="list-item__photo" style="display:flex;align-items:center;justify-content:center;color:var(--color-muted-fg);">
               <i data-lucide="package" width="20" height="20"></i>
             </div>`
        }
        <div class="list-item__info">
          <div class="list-item__name">${Utils.escapeHtml(p.nome)}</div>
          <div class="list-item__meta">${Utils.escapeHtml(p.categoria || '')}${p.horas ? ` · ${p.horas}h` : ''}</div>
        </div>
        <div class="list-item__value">${Utils.formatCurrency(p.custoTotal || 0)}</div>
      </div>
    `).join('');

    Utils.refreshIcons();
    if (!listenersOk) { setupListeners(); listenersOk = true; }
  }

  function setupListeners() {
    const lista = document.getElementById('peca-lista');
    if (!lista) return;

    lista.addEventListener('click', (e) => {
      if (blockClick) { blockClick = false; return; }
      const item = e.target.closest('[data-id]');
      if (item) abrirModal(item.dataset.id);
    });

    lista.addEventListener('touchstart', (e) => {
      const item = e.target.closest('[data-id]');
      if (!item) return;
      pressTimer = setTimeout(() => {
        blockClick = true;
        const id   = item.dataset.id;
        const nome = pecas.find(x => x.id === id)?.nome || '';
        ActionSheet.show(nome, [
          { label: 'Editar',   icon: 'edit-2',  action: `PecasPage.abrirModal('${id}'); ActionSheet.hide();` },
          { label: 'Duplicar', icon: 'copy',    action: `PecasPage.duplicar('${id}'); ActionSheet.hide();` },
          { label: 'Excluir',  icon: 'trash-2', color: 'var(--color-destructive)', action: `PecasPage.excluir('${id}'); ActionSheet.hide();` },
        ]);
      }, 600);
    }, { passive: true });

    lista.addEventListener('touchend',    () => clearTimeout(pressTimer));
    lista.addEventListener('touchcancel', () => clearTimeout(pressTimer));
    lista.addEventListener('touchmove',   () => clearTimeout(pressTimer));
  }

  function filtrar(texto) {
    filtrado = Utils.filterByText(pecas, texto, ['nome', 'categoria', 'desc']);
    renderizar();
  }

  function _carregarCatSelect(valorAtual) {
    const cats = Utils.getCategorias('pecas');
    const sel  = document.getElementById('peca-categoria');
    sel.innerHTML = '<option value="">Selecionar...</option>' +
      cats.map(c => `<option value="${c}" ${c === (valorAtual||'') ? 'selected' : ''}>${Utils.escapeHtml(c)}</option>`).join('');
  }

  function _preencherForm(p, novoId) {
    document.getElementById('peca-id').value         = novoId || p.id;
    document.getElementById('peca-nome').value       = p.nome || '';
    document.getElementById('peca-desc').value       = p.desc || '';
    document.getElementById('peca-horas').value      = p.horas || '';
    document.getElementById('peca-valor-hora').value = p.valorHora || '';
    _carregarCatSelect(p.categoria);
    matsPeca = p.materiais ? (typeof p.materiais === 'string' ? JSON.parse(p.materiais) : p.materiais) : [];
    if (p.foto) {
      const label = document.getElementById('peca-photo-label');
      let img = label.querySelector('img');
      if (!img) { img = document.createElement('img'); label.appendChild(img); }
      img.src = p.foto;
      document.getElementById('peca-foto-base64').value = p.foto;
      document.getElementById('peca-photo-remove').style.display = 'flex';
      const icon = document.getElementById('peca-camera-icon');
      if (icon) icon.style.display = 'none';
    }
  }

  function abrirModal(id = null) {
    resetForm();
    matsPeca = [];
    const title = document.getElementById('peca-modal-title');

    if (id) {
      const p = pecas.find(x => x.id === id);
      if (!p) return;
      title.textContent = 'Editar Peça';
      _preencherForm(p);
    } else {
      title.textContent = 'Nova Peça';
      _carregarCatSelect('');
    }

    renderMatsPeca();
    document.getElementById('peca-modal').classList.add('open');
    Utils.refreshIcons();
  }

  function duplicar(id) {
    const original = pecas.find(x => x.id === id);
    if (!original) return;
    resetForm();
    matsPeca = [];
    document.getElementById('peca-modal-title').textContent = 'Duplicar Peça';
    _preencherForm(original, Utils.uid());
    document.getElementById('peca-nome').value = (original.nome || '') + ' (cópia)';
    renderMatsPeca();
    document.getElementById('peca-modal').classList.add('open');
    Utils.refreshIcons();
  }

  function fecharModal() {
    document.getElementById('peca-modal').classList.remove('open');
    resetForm();
  }

  function resetForm() {
    document.getElementById('peca-form').reset();
    document.getElementById('peca-id').value = '';
    document.getElementById('peca-foto-base64').value = '';
    document.getElementById('peca-materiais-json').value = '[]';
    const label = document.getElementById('peca-photo-label');
    const img = label.querySelector('img');
    if (img) img.remove();
    const icon = document.getElementById('peca-camera-icon');
    if (icon) icon.style.display = '';
    document.getElementById('peca-photo-remove').style.display = 'none';
    matsPeca = [];
    renderMatsPeca();
  }

  async function previewFoto(input) {
    const file = input.files[0];
    if (!file) return;
    try {
      const base64 = await Utils.resizeImage(file);
      document.getElementById('peca-foto-base64').value = base64;
      const label = document.getElementById('peca-photo-label');
      let img = label.querySelector('img');
      if (!img) { img = document.createElement('img'); label.appendChild(img); }
      img.src = base64;
      const icon = document.getElementById('peca-camera-icon');
      if (icon) icon.style.display = 'none';
      document.getElementById('peca-photo-remove').style.display = 'flex';
    } catch {
      input.value = '';
      Utils.toast('Não foi possível carregar a imagem. Tente outra foto.', 'error');
    }
  }

  function removerFoto(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    document.getElementById('peca-foto-base64').value = '';
    document.getElementById('peca-photo-input').value = '';
    const label = document.getElementById('peca-photo-label');
    const img = label.querySelector('img');
    if (img) img.remove();
    const icon = document.getElementById('peca-camera-icon');
    if (icon) icon.style.display = '';
    document.getElementById('peca-photo-remove').style.display = 'none';
  }

  function adicionarMaterial() {
    matsPeca.push({ materialId: '', quantidade: 1 });
    renderMatsPeca();
  }

  function removerMaterial(idx) {
    matsPeca.splice(idx, 1);
    renderMatsPeca();
  }

  function renderMatsPeca() {
    const container = document.getElementById('peca-mat-lista');
    container.innerHTML = matsPeca.map((item, i) => {
      const mat = materiais.find(m => m.id === item.materialId);
      const custoLinha = mat ? (parseFloat(mat.preco) || 0) * (parseFloat(item.quantidade) || 0) : 0;
      return `
      <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:var(--space-2);align-items:center;">
        <select class="form-select" style="border-radius:var(--radius-lg);"
          onchange="PecasPage.updateMat(${i}, 'materialId', this.value)">
          <option value="">Selecionar material...</option>
          ${materiais.map(m => `
            <option value="${m.id}" ${item.materialId === m.id ? 'selected' : ''}>
              ${Utils.escapeHtml(m.nome)} (${Utils.formatCurrency(m.preco)}/${Utils.escapeHtml(m.unidade)})
            </option>
          `).join('')}
        </select>
        <input class="form-input" type="number" placeholder="Qtd" min="0" step="0.01"
          value="${item.quantidade}"
          style="width:72px;border-radius:var(--radius-lg);"
          onchange="PecasPage.updateMat(${i}, 'quantidade', this.value)" />
        <span style="font-size:var(--text-sm);font-weight:600;color:var(--color-primary);white-space:nowrap;min-width:64px;text-align:right;">${Utils.formatCurrency(custoLinha)}</span>
        <button type="button" class="btn btn--ghost btn--sm" onclick="PecasPage.removerMaterial(${i})">
          <i data-lucide="trash-2" width="16" height="16" style="color:var(--color-destructive);"></i>
        </button>
      </div>
    `}).join('');

    Utils.refreshIcons();
    recalcularCusto();
  }

  function updateMat(idx, field, value) {
    matsPeca[idx][field] = field === 'quantidade' ? parseFloat(value) || 0 : value;
    renderMatsPeca();
  }

  function recalcularCusto() {
    let total = 0;
    matsPeca.forEach(item => {
      const mat = materiais.find(m => m.id === item.materialId);
      if (mat) total += (parseFloat(mat.preco) || 0) * (parseFloat(item.quantidade) || 0);
    });
    const horas     = parseFloat(document.getElementById('peca-horas')?.value) || 0;
    const valorHora = parseFloat(document.getElementById('peca-valor-hora')?.value) || 0;
    total += horas * valorHora;
    const el = document.getElementById('peca-custo-calc');
    if (el) el.textContent = Utils.formatCurrency(total);
    return total;
  }

  async function excluir(id) {
    const p = pecas.find(x => x.id === id);
    if (!p) return;
    if (!window.confirm(`Excluir "${p.nome}"? Esta ação não pode ser desfeita.`)) return;
    try {
      await API.deletePeca(id);
      Utils.toast('Peça excluída.', 'success');
      await carregar();
    } catch (err) {
      Utils.toast('Erro ao excluir: ' + err.message, 'error');
    }
  }

  async function salvar(e) {
    e.preventDefault();
    const btn = document.getElementById('peca-save-btn');
    btn.disabled = true;

    const custo = recalcularCusto();
    const peca = {
      id:         document.getElementById('peca-id').value || Utils.uid(),
      nome:       document.getElementById('peca-nome').value,
      categoria:  document.getElementById('peca-categoria').value,
      desc:       document.getElementById('peca-desc').value,
      horas:      parseFloat(document.getElementById('peca-horas').value) || 0,
      valorHora:  parseFloat(document.getElementById('peca-valor-hora').value) || 0,
      materiais:  JSON.stringify(matsPeca),
      custoTotal: custo,
      foto:       document.getElementById('peca-foto-base64').value,
    };

    try {
      await API.savePeca(peca);
      Utils.toast('Peça salva!', 'success');
      fecharModal();
      await carregar();
    } catch (err) {
      console.error('[PecasPage] Erro ao salvar:', err);
      Utils.toast('Erro ao salvar: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  return { abrirModal, duplicar, excluir, fecharModal, salvar, filtrar, previewFoto, adicionarMaterial, removerMaterial, updateMat, removerFoto };
})();
</script>
