<!-- ============================================================
     PRECIFICAZ — Materiais
     Cadastro de insumos: tecido, ziper, manta, alça, etc.
     ============================================================ -->
<div class="page-header">
  <h1 class="page-header__title">Materiais</h1>
</div>

<div class="page-content">
  <!-- Busca -->
  <div class="search-bar">
    <span class="search-bar__icon">
      <i data-lucide="search" width="16" height="16"></i>
    </span>
    <input
      class="form-input"
      type="search"
      placeholder="Buscar material..."
      id="mat-search"
      oninput="MateriaisPage.filtrar(this.value)"
    />
  </div>

  <!-- Lista -->
  <div id="mat-lista">
    <div class="empty-state">
      <div class="loading-spinner"></div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="MateriaisPage.abrirModal()">
  <i data-lucide="plus" width="24" height="24"></i>
</button>

<!-- Modal de cadastro/edição -->
<div class="modal-backdrop" id="mat-modal">
  <div class="modal">
    <div class="modal__handle"></div>
    <div class="modal__header">
      <h2 class="modal__title" id="mat-modal-title">Novo Material</h2>
      <button class="btn btn--ghost btn--sm" onclick="MateriaisPage.fecharModal()">
        <i data-lucide="x" width="20" height="20"></i>
      </button>
    </div>

    <form id="mat-form" onsubmit="MateriaisPage.salvar(event)">
      <!-- Foto -->
      <div style="display:flex;justify-content:center;margin-bottom:var(--space-5);">
        <div class="photo-upload-container" style="position:relative;width:100%;max-width:160px;">
          <label class="photo-upload" id="mat-photo-label" style="margin:0;">
            <input type="file" accept="image/*" id="mat-photo-input" onchange="MateriaisPage.previewFoto(this)" />
            <i data-lucide="camera" width="24" height="24" style="color:var(--color-muted-fg);" id="mat-camera-icon"></i>
            <span class="photo-upload__label">Adicionar foto</span>
          </label>
          <button type="button" class="photo-upload__remove" id="mat-photo-remove" style="display:none;" onclick="MateriaisPage.removerFoto(event)">
            <i data-lucide="trash-2" width="16" height="16"></i>
          </button>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:var(--space-4);">
        <div class="form-group">
          <label class="form-label">Nome <span class="required">*</span></label>
          <input class="form-input" type="text" id="mat-nome" placeholder="Ex: Tecido Oxford" required />
        </div>

        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select class="form-select" id="mat-categoria">
            <option value="">Selecionar...</option>
            <option>Tecido</option>
            <option>Ziper</option>
            <option>Manta</option>
            <option>Alça</option>
            <option>Forro</option>
            <option>Botão</option>
            <option>Elástico</option>
            <option>Linha</option>
            <option>Entretela</option>
            <option>Outros</option>
          </select>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);">
          <div class="form-group">
            <label class="form-label">Preço pago <span class="required">*</span></label>
            <input class="form-input" type="number" id="mat-preco" placeholder="0,00" step="0.01" min="0" required />
          </div>
          <div class="form-group">
            <label class="form-label">Unidade <span class="required">*</span></label>
            <select class="form-select" id="mat-unidade">
              <option value="metro">Metro (m)</option>
              <option value="metro2">Metro² (m²)</option>
              <option value="cm">Centímetro</option>
              <option value="unidade" selected>Unidade</option>
              <option value="rolo">Rolo</option>
              <option value="kg">Kg</option>
              <option value="g">Gramas</option>
              <option value="ml">Mililitro</option>
              <option value="litro">Litro</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Qtd. adquirida</label>
          <input class="form-input" type="number" id="mat-qtd" placeholder="Ex: 3" step="0.01" min="0" />
          <span class="form-hint">Informe a quantidade total comprada nessa aquisição</span>
        </div>

        <div class="form-group">
          <label class="form-label">Fornecedor</label>
          <input class="form-input" type="text" id="mat-fornecedor" placeholder="Nome da loja ou fornecedor" />
        </div>

        <div class="form-group">
          <label class="form-label">Observações</label>
          <textarea class="form-textarea" id="mat-obs" placeholder="Cor, referência, gramatura..."></textarea>
        </div>

        <input type="hidden" id="mat-id" />
        <input type="hidden" id="mat-foto-base64" />

        <button type="submit" class="btn btn--primary btn--full" id="mat-save-btn">
          <i data-lucide="save" width="18" height="18"></i>
          Salvar Material
        </button>
      </div>
    </form>
  </div>
</div>

<script>
window.MateriaisPage = (() => {
  let materiais = [];
  let filtrado  = [];

  /* Inicialização */
  document.addEventListener('pageLoaded', async (e) => {
    if (e.detail.page !== 'materiais') return;
    await carregar();
  }, { once: true });

  async function carregar() {
    try {
      const res = await API.getMateriais();
      materiais = res.data || [];
      filtrado  = [...materiais];
      renderizar();
    } catch {
      Utils.toast('Erro ao carregar materiais.', 'error');
    }
  }

  function renderizar() {
    const lista = document.getElementById('mat-lista');
    if (!filtrado.length) {
      lista.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🧵</div>
          <div class="empty-state__title">Nenhum material</div>
          <div class="empty-state__desc">Toque em + para cadastrar seu primeiro material</div>
        </div>`;
      return;
    }

    lista.innerHTML = filtrado.map(m => `
      <div class="list-item" onclick="MateriaisPage.abrirModal('${m.id}')">
        ${m.foto
          ? `<img class="list-item__photo" src="${m.foto}" alt="${Utils.escapeHtml(m.nome)}" />`
          : `<div class="list-item__photo" style="display:flex;align-items:center;justify-content:center;color:var(--color-muted-fg);">
               <i data-lucide="scissors" width="20" height="20"></i>
             </div>`
        }
        <div class="list-item__info">
          <div class="list-item__name">${Utils.escapeHtml(m.nome)}</div>
          <div class="list-item__meta">${Utils.escapeHtml(m.categoria || '')} · ${Utils.escapeHtml(m.unidade || '')}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div class="list-item__value">${Utils.formatCurrency(m.preco)}</div>
          <div style="font-size:var(--text-xs);color:var(--color-muted-fg);">/${Utils.escapeHtml(m.unidade)}</div>
        </div>
      </div>
    `).join('');

    Utils.refreshIcons();
  }

  function filtrar(texto) {
    filtrado = Utils.filterByText(materiais, texto, ['nome', 'categoria', 'fornecedor']);
    renderizar();
  }

  function abrirModal(id = null) {
    resetForm();
    const modal = document.getElementById('mat-modal');
    const title = document.getElementById('mat-modal-title');

    if (id) {
      const m = materiais.find(x => x.id === id);
      if (!m) return;
      title.textContent = 'Editar Material';
      document.getElementById('mat-id').value        = m.id;
      document.getElementById('mat-nome').value      = m.nome || '';
      document.getElementById('mat-categoria').value = m.categoria || '';
      document.getElementById('mat-preco').value     = m.preco || '';
      document.getElementById('mat-unidade').value   = m.unidade || 'unidade';
      document.getElementById('mat-qtd').value       = m.qtd || '';
      document.getElementById('mat-fornecedor').value= m.fornecedor || '';
      document.getElementById('mat-obs').value       = m.obs || '';
      if (m.foto) {
        const label = document.getElementById('mat-photo-label');
        let img = label.querySelector('img');
        if (!img) { img = document.createElement('img'); label.appendChild(img); }
        img.src = m.foto;
        document.getElementById('mat-foto-base64').value = m.foto;
        document.getElementById('mat-photo-remove').style.display = 'flex';
        const icon = document.getElementById('mat-camera-icon');
        if (icon) icon.style.display = 'none';
      }
    } else {
      title.textContent = 'Novo Material';
    }

    modal.classList.add('open');
    Utils.refreshIcons();
  }

  function fecharModal() {
    document.getElementById('mat-modal').classList.remove('open');
    resetForm();
  }

  function resetForm() {
    document.getElementById('mat-form').reset();
    document.getElementById('mat-id').value = '';
    document.getElementById('mat-foto-base64').value = '';
    const label = document.getElementById('mat-photo-label');
    const img = label.querySelector('img');
    if (img) img.remove();
    const icon = document.getElementById('mat-camera-icon');
    if (icon) icon.style.display = '';
    document.getElementById('mat-photo-remove').style.display = 'none';
  }

  async function previewFoto(input) {
    const file = input.files[0];
    if (!file) return;
    try {
      const base64 = await Utils.resizeImage(file);
      document.getElementById('mat-foto-base64').value = base64;
      const label = document.getElementById('mat-photo-label');
      let img = label.querySelector('img');
      if (!img) { img = document.createElement('img'); label.appendChild(img); }
      img.src = base64;
      const icon = document.getElementById('mat-camera-icon');
      if (icon) icon.style.display = 'none';
      document.getElementById('mat-photo-remove').style.display = 'flex';
    } catch {
      input.value = '';
      Utils.toast('Não foi possível carregar a imagem. Tente outra foto.', 'error');
    }
  }

  function removerFoto(e) {
    if (e) {
      e.preventDefault();
      e.stopPropagation();
    }
    document.getElementById('mat-foto-base64').value = '';
    document.getElementById('mat-photo-input').value = '';
    const label = document.getElementById('mat-photo-label');
    const img = label.querySelector('img');
    if (img) img.remove();
    const icon = document.getElementById('mat-camera-icon');
    if (icon) icon.style.display = '';
    document.getElementById('mat-photo-remove').style.display = 'none';
  }

  async function salvar(e) {
    e.preventDefault();
    const btn = document.getElementById('mat-save-btn');
    btn.disabled = true;

    const material = {
      id:          document.getElementById('mat-id').value || Utils.uid(),
      nome:        document.getElementById('mat-nome').value,
      categoria:   document.getElementById('mat-categoria').value,
      preco:       parseFloat(document.getElementById('mat-preco').value) || 0,
      unidade:     document.getElementById('mat-unidade').value,
      qtd:         parseFloat(document.getElementById('mat-qtd').value) || 0,
      fornecedor:  document.getElementById('mat-fornecedor').value,
      obs:         document.getElementById('mat-obs').value,
      foto:        document.getElementById('mat-foto-base64').value,
    };

    try {
      await API.saveMaterial(material);
      Utils.toast('Material salvo!', 'success');
      fecharModal();
      await carregar();
    } catch (err) {
      Utils.toast('Erro ao salvar: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  return { abrirModal, fecharModal, salvar, filtrar, previewFoto, removerFoto };
})();
</script>
