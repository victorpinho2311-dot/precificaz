<!-- ============================================================
     PRECIFICAZ — Login
     ============================================================ -->
<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-8);
    background: var(--color-bg);
  }
  .login-logo {
    text-align: center;
    margin-bottom: var(--space-10);
  }
  .login-logo__icon {
    width: 80px;
    height: 80px;
    background: var(--color-primary);
    border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto var(--space-4);
    color: var(--color-primary-fg);
  }
  .login-logo__name {
    font-family: var(--font-heading);
    font-size: var(--text-3xl);
    font-weight: 700;
    color: var(--color-fg);
  }
  .login-logo__tagline {
    font-size: var(--text-sm);
    color: var(--color-muted-fg);
    margin-top: var(--space-1);
  }
  .login-card {
    width: 100%;
    max-width: 360px;
  }
  .login-form {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }
</style>

<div class="login-page">
  <div class="login-logo">
    <div class="login-logo__icon">
      <i data-lucide="tag" width="36" height="36"></i>
    </div>
    <div class="login-logo__name">Precificaz</div>
    <div class="login-logo__tagline">Gestão de artigos artesanais</div>
  </div>

  <div class="login-card card">
    <div class="login-form">
      <div class="form-group">
        <label class="form-label" for="senha-input">Senha</label>
        <input
          class="form-input"
          type="password"
          id="senha-input"
          placeholder="Digite sua senha"
          autocomplete="current-password"
        />
      </div>

      <button class="btn btn--primary btn--full" id="login-btn">
        <i data-lucide="log-in" width="18" height="18"></i>
        Entrar
      </button>

      <p id="login-error" style="
        text-align:center;
        font-size:var(--text-sm);
        color:var(--color-destructive);
        display:none;
        margin:0;
      "></p>
    </div>
  </div>

  <!-- Card de oferta de biometria (mostrado após primeiro login) -->
  <div class="login-card card" id="bio-offer-card" style="display:none;text-align:center;">
    <div style="margin-bottom:var(--space-5);">
      <div style="width:64px;height:64px;background:var(--color-muted);border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-4);color:var(--color-primary);">
        <i data-lucide="fingerprint" width="32" height="32"></i>
      </div>
      <div style="font-family:var(--font-heading);font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-2);">Ativar Face ID?</div>
      <div style="font-size:var(--text-sm);color:var(--color-muted-fg);">
        Da próxima vez que abrir o app, você poderá entrar só com o rosto.
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--space-3);">
      <button class="btn btn--primary btn--full" id="bio-sim-btn">
        <i data-lucide="fingerprint" width="18" height="18"></i>
        Sim, ativar Face ID
      </button>
      <button class="btn btn--ghost btn--full" id="bio-nao-btn">Não agora</button>
    </div>
  </div>

  <p style="margin-top:var(--space-6);font-size:var(--text-xs);color:var(--color-muted-fg);text-align:center;">
    Precificaz · Uso privado
  </p>
</div>

<script>
(function() {
  function mostrarErro(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function setLoading(on) {
    const btn = document.getElementById('login-btn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<div class="loading-spinner" style="width:20px;height:20px;margin:0"></div>'
      : '<i data-lucide="log-in" width="18" height="18"></i> Entrar';
    if (!on) Utils.refreshIcons();
  }

  async function fazerLogin() {
    const input = document.getElementById('senha-input');
    const senha = input.value;

    if (!senha) {
      mostrarErro('Digite a senha.');
      input.focus();
      return;
    }

    document.getElementById('login-error').style.display = 'none';
    setLoading(true);

    try {
      await Auth.login(senha);

      // Oferecer biometria na primeira vez que o dispositivo suporta
      const bioDisponivel = await Auth.isBiometricAvailable();
      if (bioDisponivel && !Auth.isBiometricEnrolled()) {
        setLoading(false);
        await oferecerBiometria();
      }

      Router.go('dashboard');
    } catch (err) {
      console.error('[Login] Erro:', err.message);
      const msg = err.message && err.message.includes('Senha incorreta')
        ? 'Senha incorreta. Tente novamente.'
        : 'Erro de conexão: ' + (err.message || 'verifique o console');
      mostrarErro(msg);
      input.value = '';
      input.focus();
      setLoading(false);
    }
  }

  function oferecerBiometria() {
    return new Promise((resolve) => {
      // Esconde o formulário de senha e mostra o card de biometria
      document.querySelector('.login-card').style.display = 'none';
      const card = document.getElementById('bio-offer-card');
      card.style.display = 'block';

      document.getElementById('bio-sim-btn').addEventListener('click', async () => {
        const btn = document.getElementById('bio-sim-btn');
        btn.disabled = true;
        try {
          await Auth.enrollBiometric();
          Utils.toast('Face ID / biometria ativado!', 'success');
        } catch {
          Utils.toast('Não foi possível ativar a biometria agora.', 'error');
        }
        resolve();
      });

      document.getElementById('bio-nao-btn').addEventListener('click', () => resolve());
    });
  }

  // Botão
  document.getElementById('login-btn').addEventListener('click', fazerLogin);

  // Enter no campo
  document.getElementById('senha-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      fazerLogin();
    }
  });

  // Foco automático
  setTimeout(() => {
    const input = document.getElementById('senha-input');
    if (input) input.focus();
  }, 100);
})();
</script>
