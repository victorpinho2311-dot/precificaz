<!-- ============================================================
     PRECIFICAZ — Login
     ============================================================ -->
<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-8);
    background: var(--color-bg);
  }

  .login-logo {
    text-align: center;
    margin-bottom: var(--space-10);
  }

  .login-logo__icon {
    width: 80px;
    height: 80px;
    background: var(--color-primary);
    border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto var(--space-4);
    color: var(--color-primary-fg);
  }

  .login-logo__name {
    font-family: var(--font-heading);
    font-size: var(--text-3xl);
    font-weight: 700;
    color: var(--color-fg);
  }

  .login-logo__tagline {
    font-size: var(--text-sm);
    color: var(--color-muted-fg);
    margin-top: var(--space-1);
  }

  .login-card {
    width: 100%;
    max-width: 360px;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }
</style>

<div class="login-page">
  <div class="login-logo">
    <div class="login-logo__icon">
      <i data-lucide="tag" width="36" height="36"></i>
    </div>
    <div class="login-logo__name">Precificaz</div>
    <div class="login-logo__tagline">Gestão de artigos artesanais</div>
  </div>

  <div class="login-card card">
    <form class="login-form" id="login-form" onsubmit="LoginPage.submit(event)">
      <div class="form-group">
        <label class="form-label" for="senha-input">
          Senha <span class="required">*</span>
        </label>
        <input
          class="form-input"
          type="password"
          id="senha-input"
          placeholder="Digite sua senha"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn btn--primary btn--full" id="login-btn">
        <i data-lucide="log-in" width="18" height="18"></i>
        Entrar
      </button>

      <p id="login-error" style="
        text-align:center;font-size:var(--text-sm);
        color:var(--color-destructive);display:none;
      "></p>
    </form>
  </div>

  <p style="margin-top:var(--space-6);font-size:var(--text-xs);color:var(--color-muted-fg);text-align:center;">
    Precificaz · Uso privado
  </p>
</div>

<script>
  const LoginPage = {
    async submit(e) {
      e.preventDefault();
      const btn   = document.getElementById('login-btn');
      const error = document.getElementById('login-error');
      const senha = document.getElementById('senha-input').value;

      btn.disabled  = true;
      btn.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;margin:0"></div>';
      error.style.display = 'none';

      try {
        await Auth.login(senha);
        Router.go('dashboard');
      } catch (err) {
        console.error('[Login] Erro:', err.message);
        const msg = err.message && err.message.includes('Senha incorreta')
          ? 'Senha incorreta. Tente novamente.'
          : 'Erro de conexão: ' + (err.message || 'verifique o console');
        error.textContent    = msg;
        error.style.display  = 'block';
        btn.disabled         = false;
        btn.innerHTML        = '<i data-lucide="log-in" width="18" height="18"></i> Entrar';
        Utils.refreshIcons();
      }
    }
  };
</script>
